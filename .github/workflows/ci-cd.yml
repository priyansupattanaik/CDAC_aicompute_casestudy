name: Spark Docker Kubernetes CI CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate source files
        run: |
          test -f AI_Compute_CaseStudy1.ipynb
          test -f DataCoSupplyChainDataset.csv
          test -f fuel.csv
          test -f Dockerfile
          test -f app/spark_app.py
          test -f k8s/deployment.yaml
          test -f k8s/service.yaml

      - name: Build Docker image
        run: docker build -t smart-logistics-spark:latest .

      - name: Test Docker image
        run: docker run --rm smart-logistics-spark:latest

      - name: Validate Kubernetes manifests
        run: |
          grep -q 'apiVersion: apps/v1' k8s/deployment.yaml
          grep -q 'kind: Deployment' k8s/deployment.yaml
          grep -q 'name: logistics-spark' k8s/deployment.yaml
          grep -q 'app: logistics-spark' k8s/deployment.yaml
          grep -q 'image: smart-logistics-spark:latest' k8s/deployment.yaml
          grep -q 'imagePullPolicy: Never' k8s/deployment.yaml
          grep -q 'spark-submit /app/app/spark_app.py' k8s/deployment.yaml
          grep -q 'containerPort: 8080' k8s/deployment.yaml
          grep -q 'apiVersion: v1' k8s/service.yaml
          grep -q 'kind: Service' k8s/service.yaml
          grep -q 'name: logistics-spark-service' k8s/service.yaml
          grep -q 'type: NodePort' k8s/service.yaml
          grep -q 'targetPort: 8080' k8s/service.yaml
          echo 'Kubernetes manifest offline validation passed.'
