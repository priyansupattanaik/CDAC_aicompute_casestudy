name: Spark Docker Kubernetes CI CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate source files
        run: |
          test -f AI_Compute_CaseStudy1.ipynb
          test -f DataCoSupplyChainDataset.csv
          test -f fuel.csv
          test -f Dockerfile
          test -f app/spark_app.py
          test -f k8s/deployment.yaml
          test -f k8s/service.yaml

      - name: Build Docker image
        run: docker build -t smart-logistics-spark:latest .

      - name: Test Docker image
        run: docker run --rm smart-logistics-spark:latest

      - name: Create Kubernetes cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: logistics-ci

      - name: Load Docker image into Kubernetes cluster
        run: kind load docker-image smart-logistics-spark:latest --name logistics-ci

      - name: Validate Kubernetes cluster
        run: |
          kubectl version --client=true
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy to Kubernetes
        run: |
          kubectl apply --dry-run=client -f k8s/deployment.yaml
          kubectl apply --dry-run=client -f k8s/service.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/logistics-spark --timeout=300s
          kubectl get pods -o wide
          kubectl get svc
          kubectl logs deployment/logistics-spark --tail=200
